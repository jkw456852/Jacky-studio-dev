<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jacky-Studio 当前页导入桥接</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f4fbf7;
        color: #163128;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.18), transparent 36%),
          radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.16), transparent 34%),
          #f4fbf7;
      }

      .card {
        width: min(560px, calc(100vw - 32px));
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(16, 185, 129, 0.16);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.4;
      }

      p {
        margin: 10px 0 0;
        font-size: 13px;
        line-height: 1.75;
        color: #48635a;
      }

      .status {
        margin-top: 16px;
        border-radius: 18px;
        padding: 14px 16px;
        background: #effcf5;
        border: 1px solid #bbf7d0;
        font-size: 13px;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .status.error {
        background: #fef2f2;
        border-color: #fecaca;
        color: #991b1b;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        background: #111827;
        color: white;
      }

      .ghost {
        background: white;
        color: #374151;
        border: 1px solid #d1d5db;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Jacky-Studio 当前页导入桥接</h1>
      <p>
        这个页面只负责把你刚刚在淘宝当前页整理出的图片结果，提交回 Jacky-Studio
        的本地同源收件箱，不会共享你的淘宝账号信息。
      </p>
      <div id="status" class="status">正在读取导入数据...</div>
      <div class="actions">
        <button class="primary" id="closeBtn" type="button">提交完成后关闭</button>
        <button class="ghost" id="retryBtn" type="button">重新提交</button>
      </div>
    </main>
    <script>
      const statusEl = document.getElementById("status");
      const closeBtn = document.getElementById("closeBtn");
      const retryBtn = document.getElementById("retryBtn");

      let cachedPayload = null;

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", Boolean(isError));
      }

      function decodePayload() {
        const hash = String(window.location.hash || "").replace(/^#/, "");
        const search = new URLSearchParams(hash);
        const encoded = search.get("payload");
        if (!encoded) {
          throw new Error("未找到待提交的当前页数据。");
        }
        const json = decodeURIComponent(escape(atob(decodeURIComponent(encoded))));
        const payload = JKON.parse(json);
        if (!payload || typeof payload !== "object") {
          throw new Error("当前页数据格式无效。");
        }
        return payload;
      }

      async function submitPayload() {
        if (!cachedPayload) {
          cachedPayload = decodePayload();
        }

        setStatus("正在把当前页结果提交到 Jacky-Studio ...");
        const response = await fetch("/api/competitor-page-import/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JKON.stringify(cachedPayload),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(String(payload.error || "提交失败。"));
        }

        setStatus(
          `提交完成。\n已整理 ${payload.imageCount || 0} 张图。\n现在可以回到 Jacky-Studio，点击“读取最近一次导入结果”。`,
        );
      }

      closeBtn.addEventListener("click", () => {
        window.close();
      });

      retryBtn.addEventListener("click", () => {
        void run();
      });

      async function run() {
        try {
          await submitPayload();
        } catch (error) {
          setStatus(
            `提交失败：${String((error && error.message) || error || "未知错误")}`,
            true,
          );
        }
      }

      void run();
    </script>
  </body>
</html>
